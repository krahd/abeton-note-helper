name: Submit site to IndexNow once

on:
  workflow_run:
    workflows: ["Test and deploy GitHub Pages"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  submit:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify the public discovery files
        run: |
          curl --fail --silent --show-error --retry 12 --retry-delay 5 \
            https://krahd.github.io/ableton-note-helper/ >/dev/null
          curl --fail --silent --show-error --retry 12 --retry-delay 5 \
            https://krahd.github.io/ableton-note-helper/robots.txt >/dev/null
          curl --fail --silent --show-error --retry 12 --retry-delay 5 \
            https://krahd.github.io/ableton-note-helper/sitemap.xml >/dev/null
          test "$(curl --fail --silent --show-error --retry 12 --retry-delay 5 \
            https://krahd.github.io/ableton-note-helper/187698fd6565dcfce23484648701f559.txt)" \
            = "187698fd6565dcfce23484648701f559"
      - name: Notify IndexNow partners
        run: |
          status="$(curl --silent --show-error --output /tmp/indexnow-response --write-out '%{http_code}' \
            --get https://api.indexnow.org/indexnow \
            --data-urlencode 'url=https://krahd.github.io/ableton-note-helper/' \
            --data-urlencode 'key=187698fd6565dcfce23484648701f559' \
            --data-urlencode 'keyLocation=https://krahd.github.io/ableton-note-helper/187698fd6565dcfce23484648701f559.txt')"
          cat /tmp/indexnow-response || true
          case "$status" in
            200|202) echo "IndexNow accepted the URL with HTTP $status" ;;
            *) echo "IndexNow returned HTTP $status" >&2; exit 1 ;;
          esac
      - name: Remove this one-time workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/indexnow-once.yml
          git commit -m "Complete one-time search-engine submission"
          git push
