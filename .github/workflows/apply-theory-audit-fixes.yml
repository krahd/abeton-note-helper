name: Apply theory audit fixes

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-theory-audit-fixes.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Correct extension labels and chord variants
        shell: python
        run: |
          from pathlib import Path

          path = Path('music-theory.mjs')
          text = path.read_text()
          replacements = {
              "pattern('add9', 'Chords', 'Chord', 'Add 9', '1 2 3 5', [0, 2, 4, 7])": "pattern('add9', 'Chords', 'Chord', 'Add 9', '1 3 5 9', [0, 2, 4, 7])",
              "pattern('minor-add9', 'Chords', 'Chord', 'Minor add 9', '1 2 ♭3 5', [0, 2, 3, 7])": "pattern('minor-add9', 'Chords', 'Chord', 'Minor add 9', '1 ♭3 5 9', [0, 2, 3, 7])",
              "pattern('major9', 'Chords', 'Chord', 'Major 9', '1 2 3 5 7', [0, 2, 4, 7, 11])": "pattern('major9', 'Chords', 'Chord', 'Major 9', '1 3 5 7 9', [0, 2, 4, 7, 11])",
              "pattern('dominant9', 'Chords', 'Chord', 'Dominant 9', '1 2 3 5 ♭7', [0, 2, 4, 7, 10])": "pattern('dominant9', 'Chords', 'Chord', 'Dominant 9', '1 3 5 ♭7 9', [0, 2, 4, 7, 10])",
              "pattern('minor9', 'Chords', 'Chord', 'Minor 9', '1 2 ♭3 5 ♭7', [0, 2, 3, 7, 10])": "pattern('minor9', 'Chords', 'Chord', 'Minor 9', '1 ♭3 5 ♭7 9', [0, 2, 3, 7, 10])",
              "pattern('dominant11', 'Chords', 'Chord', 'Dominant 11', '1 2 3 4 5 ♭7', [0, 2, 4, 5, 7, 10])": "pattern('dominant11', 'Chords', 'Chord', 'Dominant 11', '1 3 5 ♭7 9 11', [0, 2, 4, 5, 7, 10])",
              "pattern('minor11', 'Chords', 'Chord', 'Minor 11', '1 2 ♭3 4 5 ♭7', [0, 2, 3, 5, 7, 10])": "pattern('minor11', 'Chords', 'Chord', 'Minor 11', '1 ♭3 5 ♭7 9 11', [0, 2, 3, 5, 7, 10])",
              "pattern('dominant13', 'Chords', 'Chord', 'Dominant 13', '1 2 3 5 6 ♭7', [0, 2, 4, 7, 9, 10])": "pattern('dominant13', 'Chords', 'Chord', 'Dominant 13 · no 11', '1 3 5 ♭7 9 13', [0, 2, 4, 7, 9, 10])",
              "pattern('minor13', 'Chords', 'Chord', 'Minor 13', '1 2 ♭3 5 6 ♭7', [0, 2, 3, 7, 9, 10])": "pattern('minor13', 'Chords', 'Chord', 'Minor 13 · no 11', '1 ♭3 5 ♭7 9 13', [0, 2, 3, 7, 9, 10])",
              "pattern('arp-major9', 'Arpeggios', 'Arpeggio', 'Major 9', '1 2 3 5 7', [0, 2, 4, 7, 11])": "pattern('arp-major9', 'Arpeggios', 'Arpeggio', 'Major 9', '1 3 5 7 9', [0, 2, 4, 7, 11])",
              "pattern('arp-dominant9', 'Arpeggios', 'Arpeggio', 'Dominant 9', '1 2 3 5 ♭7', [0, 2, 4, 7, 10])": "pattern('arp-dominant9', 'Arpeggios', 'Arpeggio', 'Dominant 9', '1 3 5 ♭7 9', [0, 2, 4, 7, 10])",
              "pattern('arp-minor9', 'Arpeggios', 'Arpeggio', 'Minor 9', '1 2 ♭3 5 ♭7', [0, 2, 3, 7, 10])": "pattern('arp-minor9', 'Arpeggios', 'Arpeggio', 'Minor 9', '1 ♭3 5 ♭7 9', [0, 2, 3, 7, 10])",
              "pattern('voicing-rootless-major', 'Voicings', 'Voicing', 'Major 9 · rootless', '3–6–7–9', [4, 9, 11, 14], true)": "pattern('voicing-rootless-major', 'Voicings', 'Voicing', 'Major 13 · rootless', '3–6–7–9', [4, 9, 11, 14], true)",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing expected source: {old}')
              text = text.replace(old, new)

          marker = "  pattern('minor13', 'Chords', 'Chord', 'Minor 13 · no 11', '1 ♭3 5 ♭7 9 13', [0, 2, 3, 7, 9, 10]),\n"
          additions = marker + "  pattern('dominant13-complete', 'Chords', 'Chord', 'Dominant 13 · complete', '1 3 5 ♭7 9 11 13', [0, 2, 4, 5, 7, 9, 10]),\n  pattern('minor13-complete', 'Chords', 'Chord', 'Minor 13 · complete', '1 ♭3 5 ♭7 9 11 13', [0, 2, 3, 5, 7, 9, 10]),\n"
          if marker not in text:
              raise SystemExit('Missing thirteenth insertion point')
          text = text.replace(marker, additions)

          old_dictionary = "  chord('13', 'Dominant 13', [0, 2, 4, 7, 9, 10]),\n  chord('m13', 'Minor 13', [0, 2, 3, 7, 9, 10]),"
          new_dictionary = "  chord('13', 'Dominant 13 (no 11)', [0, 2, 4, 7, 9, 10]),\n  chord('13', 'Dominant 13 (complete)', [0, 2, 4, 5, 7, 9, 10]),\n  chord('m13', 'Minor 13 (no 11)', [0, 2, 3, 7, 9, 10]),\n  chord('m13', 'Minor 13 (complete)', [0, 2, 3, 5, 7, 9, 10]),"
          if old_dictionary not in text:
              raise SystemExit('Missing chord-dictionary insertion point')
          path.write_text(text.replace(old_dictionary, new_dictionary))

          tests = Path('tests.mjs')
          test_text = tests.read_text()
          old_test = "  if (!entry.voicing) return raw.map((interval) => ((interval % 12) + 12) % 12);"
          new_test = "  if (!entry.voicing) return raw.map((interval) => ((interval % 12) + 12) % 12).sort((a, b) => a - b);"
          if old_test not in test_text:
              raise SystemExit('Missing formula-test source')
          tests.write_text(test_text.replace(old_test, new_test))
      - name: Run full test suite
        run: npm test
      - name: Commit audited theory corrections
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add music-theory.mjs tests.mjs
          git commit -m "Correct extended-chord terminology and coverage"
          git push
