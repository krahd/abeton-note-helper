name: Correct project Pages discovery metadata

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/correct-project-pages-discovery.yml

permissions:
  contents: write

jobs:
  correct:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Correct project-level crawler metadata
        shell: python
        run: |
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text()
          old = '  <link rel="canonical" href="https://krahd.github.io/ableton-note-helper/">\n'
          new = old + '  <link rel="sitemap" type="application/xml" href="sitemap.xml">\n'
          if old not in text:
              raise SystemExit('Missing canonical link insertion point')
          index.write_text(text.replace(old, new, 1))

          workflow = Path('.github/workflows/pages.yml')
          text = workflow.read_text()
          old = '          cp robots.txt sitemap.xml site.webmanifest 187698fd6565dcfce23484648701f559.txt _site/\n'
          new = '          cp sitemap.xml site.webmanifest 187698fd6565dcfce23484648701f559.txt _site/\n'
          if old not in text:
              raise SystemExit('Missing Pages copy command')
          workflow.write_text(text.replace(old, new, 1))

          tests = Path('discoverability-tests.mjs')
          text = tests.read_text()
          text = text.replace("  './robots.txt',\n", '')
          text = text.replace(
              "assert.match(html, /<link rel=\"manifest\" href=\"site\\.webmanifest\">/u);\n",
              "assert.match(html, /<link rel=\"manifest\" href=\"site\\.webmanifest\">/u);\nassert.match(html, /<link rel=\"sitemap\" type=\"application\\/xml\" href=\"sitemap\\.xml\">/u);\n",
          )
          start = text.index("const robots = read('./robots.txt');")
          end = text.index("\n\nconst sitemap = read('./sitemap.xml');", start)
          text = text[:start] + "const sitemap = read('./sitemap.xml');" + text[end + len("\n\nconst sitemap = read('./sitemap.xml');"):]
          text = text.replace("['robots.txt', 'sitemap.xml', 'site.webmanifest', `${INDEXNOW_KEY}.txt`]", "['sitemap.xml', 'site.webmanifest', `${INDEXNOW_KEY}.txt`]")
          tests.write_text(text)

          Path('robots.txt').unlink()
      - name: Run full test suite
        run: npm test
      - name: Commit correction and remove this workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/correct-project-pages-discovery.yml
          git add index.html .github/workflows/pages.yml discoverability-tests.mjs robots.txt
          git commit -m "Correct project Pages search metadata"
          git push
